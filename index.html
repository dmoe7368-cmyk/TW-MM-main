<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TW MM Tournament</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a0033">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-192.png">

    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700;900&family=Barlow+Condensed:wght@600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div id="toast-container" class="toast-container"></div>

    <header class="app-header">
        <div class="header-content">
            <div class="logo-left">
                <div class="logo-icon-glow">⚽</div>
                <div class="logo-text-block">
                    <span class="logo-title">TW MM</span>
                    <span class="logo-sub">GOLD TOURNAMENT</span>
                </div>
            </div>
            <div id="auth-root" class="auth-container"></div>
        </div>
    </header>

    <main id="main-root">
        <div class="stories-wrapper">
            <div class="stories-container">
                <div class="story-item" onclick="showTab('tournament')">
                    <div class="story-circle ring-active">🏆</div>
                    <span>TW Cup 13</span>
                </div>
                <div class="story-item" onclick="openLink('best-xi')">
                    <div class="story-circle">👕</div>
                    <span>Best XI</span>
                </div>
                <div class="story-item" onclick="showTab('livehub')">
                    <div class="story-circle">📡</div>
                    <span>Live Hub</span>
                </div>
                <div class="story-item" onclick="openLink('stats')">
                    <div class="story-circle">📊</div>
                    <span>Stats</span>
                </div>
                <div class="story-item" onclick="openLink('prizes')">
                    <div class="story-circle">🎁</div>
                    <span>Prizes</span>
                </div>
            </div>
        </div>

        <div id="content-display">
            <div class="loading-screen">
                <div class="pulse-loader">🏆</div>
                <p>TW HUB စတင်နေသည်...</p>
            </div>
        </div>
    </main>

    <nav class="bottom-nav">
        <button id="btn-home" class="nav-item active" onclick="showTab('home')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>
            <span class="nav-label">Latest</span>
        </button>
        <button id="btn-tournament" class="nav-item" onclick="showTab('tournament')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 21h8M12 21v-5"/><path d="M5 3h14v7a7 7 0 01-14 0V3z"/><path d="M5 7H2a5 5 0 004 4.9M19 7h3a5 5 0 01-4 4.9"/></svg>
            <span class="nav-label">Fantasy</span>
        </button>
        <button id="btn-livehub" class="nav-item" onclick="showTab('livehub')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
            <span class="nav-label">Matches</span>
        </button>
        <button id="btn-scouts" class="nav-item" onclick="showTab('scouts')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/><path d="M11 8v3l2 2"/></svg>
            <span class="nav-label">Scouts</span>
        </button>
        <button id="btn-community" class="nav-item" onclick="showTab('community')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
            <span class="nav-label">More</span>
        </button>
    </nav>

    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-auth-compat.js"></script>

    <script src="js/config.js?v=7"></script>
    <script>
        // Admin contact links — Coin ဝယ်ရန်
        window.TW_CONTACTS = {
            facebook: 'https://m.me/cm/AbaB1mquJbM2q8KY/?send_source=cm%3Acopy_invite_link',
            telegram: 'https://t.me/doephagyi',
        };
    </script>
    <script src="js/auth.js?v=7"></script>
    <script src="js/app.js?v=7"></script>
    <script src="js/home.js?v=7"></script>
    <script src="js/tournament.js?v=7"></script>
    <script src="js/scout.js?v=7"></script>
    <script src="js/live-hub.js?v=7"></script>
    <script src="js/community.js?v=7"></script>
    <script src="js/register-fee.js?v=7"></script>

    <!-- Profile Modal -->
    <div id="profile-modal" style="display:none;position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);align-items:flex-end;justify-content:center;">
        <div onclick="event.stopPropagation()" style="background:#0e0018;border-radius:20px 20px 0 0;width:100%;max-width:480px;border:1px solid rgba(255,255,255,0.1);border-bottom:none;padding:20px 18px 36px;">
            <div style="width:40px;height:4px;background:rgba(255,255,255,0.15);border-radius:4px;margin:0 auto 20px;"></div>
            <div style="text-align:center;margin-bottom:20px;">
                <div style="width:60px;height:60px;border-radius:50%;background:rgba(80,190,255,0.15);border:2px solid rgba(80,190,255,0.4);display:flex;align-items:center;justify-content:center;margin:0 auto 10px;font-size:1.8rem;">⚽</div>
                <div id="prof-manager" style="font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:1.3rem;color:#fff;"></div>
                <div id="prof-team" style="font-size:0.75rem;color:rgba(255,255,255,0.4);margin-top:2px;"></div>
            </div>
            <div style="background:rgba(255,255,255,0.04);border-radius:14px;padding:14px;margin-bottom:16px;display:flex;flex-direction:column;gap:10px;">
                <div style="display:flex;justify-content:space-between;">
                    <span style="font-size:0.72rem;color:rgba(255,255,255,0.4);">💰 Coins</span>
                    <span id="prof-coins" style="font-family:'Barlow Condensed',sans-serif;font-weight:800;color:#7dd8ff;"></span>
                </div>
                <div style="display:flex;justify-content:space-between;">
                    <span style="font-size:0.72rem;color:rgba(255,255,255,0.4);">📅 Weekly</span>
                    <span id="prof-week" style="font-size:0.8rem;color:#fff;"></span>
                </div>
                <div style="display:flex;justify-content:space-between;">
                    <span style="font-size:0.72rem;color:rgba(255,255,255,0.4);">🏆 Cup</span>
                    <span id="prof-cup" style="font-size:0.8rem;color:#fff;"></span>
                </div>
                <div style="display:flex;justify-content:space-between;">
                    <span style="font-size:0.72rem;color:rgba(255,255,255,0.4);">📘 Facebook</span>
                    <span id="prof-fb" style="font-size:0.8rem;color:rgba(255,255,255,0.6);"></span>
                </div>
            </div>
            <button onclick="window.handleLogout()" style="width:100%;padding:12px;border-radius:12px;background:rgba(248,113,113,0.12);border:1px solid rgba(248,113,113,0.3);color:#f87171;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:1rem;letter-spacing:1px;cursor:pointer;margin-bottom:8px;">
                🚪 LOGOUT
            </button>
            <button onclick="window.closeProfile()" style="width:100%;padding:10px;border-radius:12px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.4);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:0.85rem;cursor:pointer;">
                CLOSE
            </button>
        </div>
    </div>

    <div id="toast-container" style="position:fixed;top:70px;right:12px;z-index:9999;display:flex;flex-direction:column;gap:8px;"></div>

</body>
</html>
