<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TW MM Tournament</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00ff88">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-192.png">

    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;600;800;900&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Toast Notifications -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Header -->
    <header class="app-header">
        <div class="logo-badge">
            <div class="logo-icon">⚽</div>
            <div class="logo-text">
                <span class="logo-main">TW MM</span>
                <span class="logo-sub">Tournament · Gold</span>
            </div>
        </div>
        <div id="auth-root" class="auth-container"></div>
    </header>

    <!-- Main Content -->
    <main id="main-root">
        <div class="loading">
            <div class="spinner"></div>
            <p>🏆 TW HUB စတင်နေသည်...</p>
        </div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <button id="btn-home" class="nav-item" onclick="showTab('home')">
            <div class="nav-icon-wrap">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/>
                    <path d="M9 21V12h6v9"/>
                </svg>
            </div>
            <span class="nav-label">Home</span>
        </button>
        <button id="btn-leagues" class="nav-item" onclick="showTab('leagues')">
            <div class="nav-icon-wrap">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M8 21h8M12 21v-5"/>
                    <path d="M5 3h14v7a7 7 0 01-14 0V3z"/>
                    <path d="M5 7H2a5 5 0 004 4.9M19 7h3a5 5 0 01-4 4.9"/>
                </svg>
            </div>
            <span class="nav-label">Standings</span>
        </button>
        <button id="btn-scout" class="nav-item" onclick="showTab('scout')">
            <div class="nav-icon-wrap">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="7"/>
                    <path d="M21 21l-4.35-4.35"/>
                    <path d="M11 8v3l2 2"/>
                </svg>
            </div>
            <span class="nav-label">Scouts</span>
        </button>
        <button id="btn-live" class="nav-item" onclick="showTab('live')">
            <div class="nav-icon-wrap">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
                </svg>
            </div>
            <span class="nav-label">Live Hub</span>
        </button>
    </nav>

    <!-- Profile Modal -->
    <div id="profile-modal" class="modal-overlay" style="display:none;" onclick="closeProfile()">
        <div class="modal-content profile-card" onclick="event.stopPropagation()">
            <div class="profile-header">
                <div class="profile-avatar">⚽</div>
                <h2 id="prof-manager">Manager Name</h2>
                <p id="prof-team" class="green-text">Team Name</p>
            </div>
            <div class="profile-info">
                <div class="info-item">
                    <span class="label">FB/Contact</span>
                    <span id="prof-fb" class="val">-</span>
                </div>
                <div class="info-item">
                    <span class="label">Coins</span>
                    <span id="prof-coins" class="val gold-text">0 🪙</span>
                </div>
                <div class="info-item">
                    <span class="label">Weekly Fee</span>
                    <span id="prof-week" class="val">-</span>
                </div>
                <div class="info-item">
                    <span class="label">Cup Fee</span>
                    <span id="prof-cup" class="val">-</span>
                </div>
            </div>
            <button class="logout-btn" onclick="handleLogout()">LOGOUT</button>
            <button class="close-btn" onclick="closeProfile()">CLOSE</button>
        </div>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-auth-compat.js"></script>

    <!-- App Scripts -->
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/home.js"></script>
    <script src="js/register-fee.js"></script>
    <script src="js/community.js"></script>
    <script src="js/tournament.js"></script>
    <script src="js/scout.js"></script>
    <script src="js/live-hub.js"></script>
    <script src="js/app.js"></script>

</body>
</html>
