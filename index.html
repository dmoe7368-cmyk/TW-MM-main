<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TW MM Tournament</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a0033">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-192.png">

    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700;900&family=Barlow+Condensed:wght@600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=12">
</head>
<body>

    <div id="toast-container" class="toast-container"></div>

    <header class="app-header">
        <div class="header-content">
            <div class="logo-left">
                <div class="logo-icon-glow">⚽</div>
                <div class="logo-text-block">
                    <span class="logo-title">TW MM</span>
                    <span class="logo-sub">GOLD TOURNAMENT</span>
                </div>
            </div>
            <div id="auth-root" class="auth-container"></div>
        </div>
    </header>

    <main id="main-root">
        <div class="stories-wrapper">
            <div class="stories-container">
                <div class="story-item" onclick="showTab('tournament')">
                    <div class="story-circle ring-active">🏆</div>
                    <span>TW Cup 13</span>
                </div>
                <div class="story-item" onclick="openLink('best-xi')">
                    <div class="story-circle">👕</div>
                    <span>Best XI</span>
                </div>
                <div class="story-item" onclick="showTab('livehub')">
                    <div class="story-circle">📡</div>
                    <span>Live Hub</span>
                </div>
                <div class="story-item" onclick="openLink('stats')">
                    <div class="story-circle">📊</div>
                    <span>Stats</span>
                </div>
                <div class="story-item" onclick="openLink('prizes')">
                    <div class="story-circle">🎁</div>
                    <span>Prizes</span>
                </div>
            </div>
        </div>

        <div id="content-display">
            <div class="loading-screen">
                <div class="pulse-loader">🏆</div>
                <p>TW HUB စတင်နေသည်...</p>
            </div>
        </div>
    </main>

    <nav class="bottom-nav">
        <button id="btn-home" class="nav-item active" onclick="showTab('home')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>
            <span class="nav-label">Home</span>
        </button>
        <button id="btn-tournament" class="nav-item" onclick="showTab('tournament')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
            <span class="nav-label">TW Table</span>
        </button>
        <button id="btn-scouts" class="nav-item" onclick="showTab('scouts')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg>
            <span class="nav-label">Scout</span>
        </button>
        <button id="btn-livehub" class="nav-item" onclick="showTab('livehub')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
            <span class="nav-label">TW FA</span>
        </button>
        <button id="btn-community" class="nav-item" onclick="showTab('community')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
            <span class="nav-label">Message</span>
        </button>
    </nav>

    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-auth-compat.js"></script>

    <script src="js/config.js?v=12"></script>
    <script src="js/auth.js?v=12"></script>
    <script src="js/app.js?v=12"></script>
    <script src="js/home.js?v=12"></script>
    <script src="js/tournament.js?v=12"></script>
    <script src="js/scout.js?v=12"></script>
    <script src="js/live-hub.js?v=12"></script>
    <script src="js/community.js?v=12"></script>

    <!-- Profile Modal -->
    <div id="profile-modal" style="display:none;position:fixed;inset:0;z-index:9000;background:rgba(0,0,0,0.85);backdrop-filter:blur(8px);align-items:flex-end;justify-content:center;" onclick="if(event.target===this)window.closeProfile()">
        <div onclick="event.stopPropagation()" style="background:#1a0033;border-radius:24px 24px 0 0;width:100%;max-width:480px;border:1px solid rgba(255,255,255,0.1);animation:slideUp 0.3s ease;max-height:85vh;overflow-y:auto;">
            <!-- Header -->
            <div style="background:linear-gradient(135deg,#3d195b,#1a0033);padding:28px 20px;text-align:center;border-radius:24px 24px 0 0;">
                <div style="font-size:2.5rem;margin-bottom:10px;">⚽</div>
                <h2 id="prof-manager" style="font-family:'Barlow Condensed',sans-serif;font-size:1.4rem;font-weight:800;color:#fff;margin-bottom:4px;">Manager</h2>
                <p id="prof-team" style="font-size:0.8rem;color:rgba(255,255,255,0.5);">Team Name</p>
            </div>
            <!-- Info Grid -->
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:1px;background:rgba(255,255,255,0.08);">
                <div style="background:#0e0018;padding:16px;">
                    <div style="font-size:0.58rem;color:#64748b;letter-spacing:1px;margin-bottom:4px;">COINS</div>
                    <div id="prof-coins" style="font-weight:700;font-size:1rem;color:#fbbf24;">0 🪙</div>
                </div>
                <div style="background:#0e0018;padding:16px;">
                    <div style="font-size:0.58rem;color:#64748b;letter-spacing:1px;margin-bottom:4px;">CONTACT</div>
                    <div id="prof-fb" style="font-weight:700;font-size:1rem;color:#fff;">-</div>
                </div>
            </div>
            <!-- Fee Status -->
            <div style="padding:16px 20px;border-top:1px solid rgba(255,255,255,0.08);">
                <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.05);">
                    <span style="font-size:0.85rem;color:#94a3b8;">Weekly Fee</span>
                    <span id="prof-week" style="font-weight:700;color:#7dd8ff;">-</span>
                </div>
                <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;">
                    <span style="font-size:0.85rem;color:#94a3b8;">Cup Fee</span>
                    <span id="prof-cup" style="font-weight:700;color:#c4a0ff;">-</span>
                </div>
            </div>
            <!-- Actions -->
            <div style="display:flex;gap:10px;padding:16px 20px;border-top:1px solid rgba(255,255,255,0.08);">
                <button onclick="window.handleLogout()" style="flex:1;padding:13px;border-radius:12px;border:1px solid rgba(248,113,113,0.35);background:rgba(248,113,113,0.1);color:#f87171;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:1rem;letter-spacing:1px;">🚪 LOGOUT</button>
                <button onclick="window.closeProfile()" style="flex:1;padding:13px;border-radius:12px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.06);color:#fff;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:1rem;letter-spacing:1px;">✕ CLOSE</button>
            </div>
        </div>
    </div>

</body>
</html>
