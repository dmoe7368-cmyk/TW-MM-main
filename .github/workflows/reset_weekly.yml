name: Reset Weekly Registration

on:
  workflow_dispatch:
    inputs:
      gw_number:
        description: 'Next GW number (e.g. 31)'
        required: false
        default: ''

jobs:
  reset:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install firebase-admin
      - name: Reset Weekly
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -n "${{ github.event.inputs.gw_number }}" ]; then
            python scripts/reset_registration.py --type weekly --gw ${{ github.event.inputs.gw_number }}
          else
            python scripts/reset_registration.py --type weekly
          fi
