name: FPL News Sync

on:
  schedule:
    - cron: '0 */6 * * *'   # တစ်ရေး ၆ နာရီ (UTC) = Myanmar 6AM, 12PM, 6PM, 12AM
  workflow_dispatch:          # Manual run ခလုတ်

jobs:
  sync-fpl-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests firebase-admin

      - name: Run FPL news sync
        env:
          FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_CREDENTIALS }}
        run: python scripts/sync_fpl_news.py
